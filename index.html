<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade | PI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <link rel="stylesheet" href="style.css">

</head>

<body>
    <div>
        <canvas id="myChart"></canvas>
    </div>

    <div>
        <canvas id="myChart2"></canvas>
    </div>
</body>

</html>
<script>
  const graficoLine = document.getElementById('myChart');

  new Chart(graficoLine, {
    type: 'line',
    data: {
      labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
      datasets: [{
        label: 'Temperatura',
        data: [30, 29, 28, 25, 22, 23],
        borderColor: 'palevioletred',
        backgroundColor: 'palevioletred'
      },
      {
        label: 'Umidade',
        data: [80, 82, 80, 85, 80, 83],
        borderColor: 'rgb(53, 152, 218)',
        backgroundColor:  'rgb(53, 152, 218)'
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>

<script>
  const graficoBar= document.getElementById('myChart2');

  new Chart(graficoBar, {
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'Temperatura Média',
        data: [22, 24, 27, 23, 20, 18],
        borderColor: 'palevioletred',
        backgroundColor: 'palevioletred'
      },
       {
        label: 'Umidade Média',
        data: [90, 89, 93, 87, 88, 82],
        borderColor: 'rgb(53, 152, 218)',
        backgroundColor:  'rgb(53, 152, 218)'
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>
